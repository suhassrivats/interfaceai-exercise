# Set DOCKERHUB_USERNAME in .env or export to pull from Docker Hub
# Example: echo "DOCKERHUB_USERNAME=yourusername" > .env
services:
  db:
    image: ${DOCKERHUB_USERNAME:-suhassrivats}/interfaceai-exercise-db:latest
    build:
      context: ./database
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todo_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ${DOCKERHUB_USERNAME:-suhassrivats}/interfaceai-exercise-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/todo_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
