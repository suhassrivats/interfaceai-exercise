<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Todo</h1>
      <form id="todo-form" class="add-form">
        <input
          type="text"
          id="todo-title"
          placeholder="What needs to be done?"
          autocomplete="off"
          required
        />
        <input
          type="text"
          id="todo-desc"
          placeholder="Description (optional)"
          autocomplete="off"
        />
        <button type="submit">Add</button>
      </form>
    </header>
    <div class="filters">
      <button type="button" data-filter="all" class="active">All</button>
      <button type="button" data-filter="active">Active</button>
      <button type="button" data-filter="completed">Completed</button>
    </div>
    <ul id="todo-list" class="todo-list"></ul>
    <p id="empty-state" class="empty-state">No todos yet. Add one above.</p>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
